# NaviOpsSec SIEM lab — Wazuh single-node (manager + indexer + dashboard) + a victim target.
#
# This is a faithful single-node Wazuh 4.9 stack. It is HEAVY: needs ~4GB RAM free and
# vm.max_map_count=262144 (the bootstrap sets it). Certs are generated once by the sibling
# generate-certs.yml (see LAB.md) into ./config/wazuh_indexer_ssl_certs/.
#
#   ../bootstrap.sh certs      # one-time: generate SSL certs
#   ../bootstrap.sh up         # start the stack
#   Dashboard: https://localhost:8443  (admin / SecretPassword — change it)
#
# The `victim` node runs a Wazuh agent + sshd so you can generate real detections
# (failed SSH logins, brute force) for Lessons 18-20 alert triage.

name: naviopssec-lab

services:
  wazuh.manager:
    image: wazuh/wazuh-manager:4.9.0
    container_name: wazuh.manager
    hostname: wazuh.manager
    restart: always
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 655360, hard: 655360 }
    ports:
      - "1514:1514"     # agent event channel
      - "1515:1515"     # agent enrollment
      - "55000:55000"   # Wazuh API
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
    volumes:
      - manager-config:/wazuh-config-mount/etc/
      - ./config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem:ro
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key:ro
    networks: [siem]

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.9.0
    container_name: wazuh.indexer
    hostname: wazuh.indexer
    restart: always
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 655360, hard: 655360 }
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh_indexer_ssl_certs/:/usr/share/wazuh-indexer/certs/:ro
    networks: [siem]

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.9.0
    container_name: wazuh.dashboard
    hostname: wazuh.dashboard
    restart: always
    ports:
      - "8443:5601"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
    volumes:
      - ./config/wazuh_indexer_ssl_certs/:/usr/share/wazuh-dashboard/certs/:ro
    depends_on: [wazuh.indexer]
    networks: [siem]

  # A target to attack/monitor — sshd + Wazuh agent generate real events to triage.
  victim:
    image: jrei/systemd-ubuntu:22.04
    container_name: siem-victim
    hostname: victim.naviops.lab
    privileged: true
    stop_signal: SIGRTMIN+3
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs: [/run, /run/lock]
    ports:
      - "2222:22"
    networks: [siem]

networks:
  siem: { driver: bridge }

volumes:
  manager-config:
  indexer-data:
