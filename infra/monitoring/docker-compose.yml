# NaviOps NOC Monitoring Stack — what a Tier-1 NOC actually stares at all shift.
#
# Prometheus (metrics) + node-exporter (host metrics) + Grafana (dashboards) + Nagios (the classic
# NOC tool recruiters name). Practice: read dashboards, spot abnormal, ack/triage alerts (Lesson 19/28).
#
# Bring up:  ../bootstrap.sh monitoring   (or: docker-compose up -d here)
# Grafana:   http://localhost:3000   (admin / naviops — change on first login)
# Prometheus http://localhost:9090
# Nagios:    http://localhost:8081/nagios  (nagiosadmin / naviops)
# Offline:   images pull once; then runs with no internet.

name: naviops-monitoring

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: naviops-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    ports:
      - "9090:9090"
    networks: [monitoring]
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: naviops-node-exporter
    command:
      - '--path.rootfs=/host'
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks: [monitoring]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: naviops-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=naviops
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks: [monitoring]
    depends_on: [prometheus]
    restart: unless-stopped

  # The classic NOC tool. Ships with a demo config you can extend with host/service checks.
  nagios:
    image: jasonrivers/nagios:latest
    container_name: naviops-nagios
    environment:
      - NAGIOSADMIN_USER=nagiosadmin
      - NAGIOSADMIN_PASS=naviops
    volumes:
      - nagios-etc:/opt/nagios/etc
      - nagios-var:/opt/nagios/var
    ports:
      - "8081:80"
    networks: [monitoring]
    restart: unless-stopped

networks:
  monitoring:
    driver: bridge

volumes:
  prom-data:
  grafana-data:
  nagios-etc:
  nagios-var:
